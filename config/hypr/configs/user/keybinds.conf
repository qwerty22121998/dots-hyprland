###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$scriptsDir = $HOME/.config/hypr/scripts
bindd = $mainMod SHIFT, E, emoji picker, exec, hypremoji


#screenshot
bindd = $mainMod SHIFT, S, screenshot, exec, $scriptsDir/screenshot.sh
